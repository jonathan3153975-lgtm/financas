name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

      - name: Configure SSH
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euo pipefail
          test -n "$SSH_HOST" || { echo "Secret SSH_HOST ausente"; exit 1; }
          test -n "$SSH_PORT" || { echo "Secret SSH_PORT ausente"; exit 1; }
          test -n "$SSH_USER" || { echo "Secret SSH_USER ausente"; exit 1; }
          test -n "$SSH_PRIVATE_KEY" || { echo "Secret SSH_PRIVATE_KEY ausente"; exit 1; }
          test -n "$REMOTE_PATH" || { echo "Secret REMOTE_PATH ausente"; exit 1; }
          case "$SSH_PORT" in
            ''|*[!0-9]*) echo "Secret SSH_PORT invalido"; exit 1 ;;
          esac

      - name: Test SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          ssh -vvv -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -l "$SSH_USER" "$SSH_HOST" \
            "echo 'SSH conectado com sucesso' && pwd && ls -la"

      - name: Check remote path
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euxo pipefail
          ssh -vvv -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -l "$SSH_USER" "$SSH_HOST" \
            "ls -la '$REMOTE_PATH'"

      - name: Deploy files
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          set -euxo pipefail
          rsync -avz --delete --progress -vv --itemize-changes --stats \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            --exclude=".git/" \
            --exclude=".github/" \
            ./ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH"





